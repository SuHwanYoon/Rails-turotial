version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: rails-mysql-container
    command: --default-authentication-plugin=mysql_native_password
    volumes:
      - mysql_data:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: password
    ports:
      - "${DB_PORT:-3306}:3306"

volumes:
  mysql_data: